# CI gate for the CognitiveOS reference implementation.
# Definition of Done requires this workflow green on BOTH OSes (AGENTS.md).
name: CI

on:
  push:
    branches: ["main", "lane/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Toolchains ---------------------------------------------------------
      - name: Set up Rust (pinned by rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Set up pnpm (version from packageManager field)
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # TypeScript side ------------------------------------------------------
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm -r build

      - name: Test TypeScript packages
        run: pnpm -r test

      # Rust side ------------------------------------------------------------
      - name: Build Rust workspace
        run: cargo build --workspace --locked

      - name: Test Rust workspace
        run: cargo test --workspace --locked

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: rustfmt check
        run: cargo fmt --all -- --check

      # Schema-binding drift gate (ADR-0006 item 4): regenerate and diff -----
      - name: Regenerate schema bindings and diff (codegen drift gate)
        run: |
          cargo run --locked -q -p cognitive-contracts --bin contracts-codegen
          cargo fmt --all
          git diff --exit-code -- crates/cognitive-contracts/src/generated packages/contracts-ts/src/generated

      # Static consistency (registry <-> schema <-> vector <-> docs) ---------
      - name: Consistency check (orphans, links, matrix, ledger)
        run: node tools/src/check-consistency.mjs

      - name: Traceability matrix freshness
        run: node tools/src/gen-matrix.mjs --check

      # Conformance runner (M1 static-contract + M2 kernel-behavioral
      # execution; honest not-run for later-milestone behavior) ------------
      - name: Run conformance runner (five-state report + sample manifest)
        run: cargo run --locked -p cognitive-conformance --bin conformance-runner

      - name: Validate sample profile manifest against schema
        run: node tools/src/validate-manifest.mjs

      # Report honesty gate: pass only with execution evidence, not-run only
      # with a recorded reason, and the five-state distribution pinned to the
      # measured counts (IMP-17). The pinned numbers may only change together
      # with a reviewed vector or runner-capability change.
      # 2026-07-20 M4 batch: seven effect/recovery vectors execute
      # behaviorally through the public fault-injection framework
      # (pass 39 -> 46, not-run 42 -> 35).
      - name: Assert report honesty (evidence-backed pass, reasoned not-run, pinned counts)
        run: |
          node -e "
            const r = require('./artifacts/evidence/conformance/conformance-report.json');
            const s = r.summary;
            const pinned = { total_vectors: 81, pass: 46, fail: 0, 'not-applicable': 0, 'documented-degradation': 0, 'not-run': 35 };
            for (const [key, want] of Object.entries(pinned)) {
              if (s[key] !== want) throw new Error('summary.' + key + ' = ' + s[key] + ', pinned ' + want);
            }
            if (s.pass + s.fail + s['not-applicable'] + s['documented-degradation'] + s['not-run'] !== s.total_vectors) {
              throw new Error('five-state counts do not sum to total');
            }
            for (const v of r.vectors) {
              if (v.result === 'pass' || v.result === 'fail') {
                if (!v.execution || !(v.execution.grounding || []).length || !(v.execution.compared_fields >= 1)) {
                  throw new Error(v.id + ' reported ' + v.result + ' without execution evidence');
                }
              } else if (v.result === 'not-run') {
                if (!v.not_run_reason) throw new Error(v.id + ' not-run without recorded reason');
                if (v.execution) throw new Error(v.id + ' not-run but carries an execution record');
              } else {
                throw new Error(v.id + ' unexpected result state ' + v.result);
              }
            }
            console.log('runner report honest:', s.pass, 'evidence-backed pass /', s['not-run'], 'reasoned not-run of', s.total_vectors);
          "

      # Runner self-check (conformance-evidence.md section 3): a deliberately
      # wrong, schema-valid implementation MUST be failed by the runner —
      # including the M2 behavioral corruption (a gate-bypassing direct
      # store writer over the real SQLite authority database).
      - name: Runner self-check (wrong implementation must fail)
        run: |
          cargo run --locked -q -p cognitive-conformance --bin conformance-runner -- --self-check
          node -e "
            const r = require('./artifacts/evidence/conformance/self-check-report.json');
            if (r.corrupted_but_still_passing.length !== 0) throw new Error('wrong implementation not failed: ' + r.corrupted_but_still_passing.join(', '));
            if (r.must_flip.length < 27) throw new Error('self-check corpus shrank to ' + r.must_flip.length);
            console.log('self-check honest:', r.flipped_to_fail.length, 'corrupted vectors all failed');
          "

      # Cross-language golden digest gate (ADR-0004 compliance check) --------
      - name: Cross-language golden digest comparison
        run: |
          mkdir -p artifacts/evidence/golden
          cargo run --locked -q -p cognitive-contracts --example emit_golden > artifacts/evidence/golden/rust-digests.json
          node packages/contracts-ts/dist/emit-golden.js > artifacts/evidence/golden/ts-digests.json
          node -e "
            const fs = require('fs');
            const rust = fs.readFileSync('artifacts/evidence/golden/rust-digests.json', 'utf-8');
            const ts = fs.readFileSync('artifacts/evidence/golden/ts-digests.json', 'utf-8');
            if (rust !== ts) { console.error('RUST:', rust); console.error('TS  :', ts); throw new Error('cross-language golden digests diverge'); }
            console.log('golden digests byte-identical across Rust and TypeScript');
          "

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.os }}
          path: artifacts/evidence/
          retention-days: 14
